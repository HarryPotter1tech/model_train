# ============ 模型 ============
model: yolo26n.pt              # 预训练权重

# ============ 数据集 ============
path: data/radar_dataset
train: images/train
val: images/val
names:
  0: hero-red
  1: hero-blue
  2: engine-red
  3: engine-blue
  4: infantry_3-red
  5: infantry_3-blue
  6: infantry_4-red
  7: infantry_4-blue
  8: sentry-red
  9: sentry-blue
  10: drone-red
  11: drone-blue

# ============ 训练超参 ============
epochs: 300                    # 第一轮训练 300 epoch
batch: 128
imgsz: 1280                    # 高分辨率训练
device: 0,1,2,3,4,5,6,7
workers: 32
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 7.5
cls: 0.5
dfl: 1.5
patience: 50
save: true
save_period: 10
val: true
amp: true
cos_lr: false
close_mosaic: 10

# ============ 日志与可视化 ============
project: runs/train
name: stage1
exist_ok: true
plots: true
resume: false

# ============ 模型导出 ============
export:
  - format: onnx
    half: true
    imgsz: 1280
  - format: onnx
    half: true
    imgsz: 640
  - format: openvino
    half: true
    imgsz: 1280
  - format: openvino
    half: true
    imgsz: 640
