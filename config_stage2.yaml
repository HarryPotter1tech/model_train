# ============ 模型 ============
model: runs/train/stage1/weights/best.pt  # 加载 stage1 最优权重继续训练

# ============ 数据集 ============
path: data/radar_dataset
train: images/train
val: images/val
names:
  0: hero-red
  1: engineer-red
  2: infantry3-red
  3: infantry4-red
  4: sentry-red
  5: drone-red
  6: hero-blue
  7: engineer-blue
  8: infantry3-blue
  9: infantry4-blue
  10: sentry-blue
  11: drone-blue

# ============ 训练超参 ============
epochs: 500                    # 第二轮训练 500 epoch
batch: 128
imgsz: 640                     # 低分辨率微调
device: 0,1,2,3,4,5,6,7
workers: 32
lr0: 0.001                     # 微调降低学习率
lrf: 0.001
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 7.5
cls: 0.5
dfl: 1.5
patience: 50
save: true
save_period: 10
val: true
amp: true
cos_lr: false
close_mosaic: 10

# ============ 日志与可视化 ============
project: runs/train
name: stage2
exist_ok: true
plots: true
resume: false

